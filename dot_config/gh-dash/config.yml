# yaml-language-server: $schema=https://gh-dash.dev/schema.json

prSections:
  - title: My Pull Requests
    filters: is:open author:@me
  - title: Needs My Review
    filters: is:open review-requested:@me
  - title: Involved
    filters: is:open involves:@me -author:@me
issuesSections:
  - title: My Issues
    filters: is:open author:@me
  - title: Assigned
    filters: is:open assignee:@me
  - title: Involved
    filters: is:open involves:@me -author:@me
notificationsSections:
  - title: All
    filters: ""
  - title: Created
    filters: reason:author
  - title: Participating
    filters: reason:participating
  - title: Mentioned
    filters: reason:mention
  - title: Review Requested
    filters: reason:review-requested
  - title: Assigned
    filters: reason:assign
  - title: Subscribed
    filters: reason:subscribed
  - title: Team Mentioned
    filters: reason:team-mention
repo:
  branchesRefetchIntervalSeconds: 30
  prsRefetchIntervalSeconds: 60
defaults:
  preview:
    open: true
    width: 0.45
  prsLimit: 20
  prApproveComment: LGTM
  issuesLimit: 20
  notificationsLimit: 20
  view: issues
  layout:
    prs:
      updatedAt:
        width: 5
      createdAt:
        width: 5
      repo:
        width: 20
      author:
        width: 15
      authorIcon:
        hidden: false
      assignees:
        width: 20
        hidden: true
      base:
        width: 15
        hidden: true
      lines:
        width: 15
    issues:
      updatedAt:
        width: 5
      createdAt:
        width: 5
      repo:
        width: 15
      creator:
        width: 10
      creatorIcon:
        hidden: false
      assignees:
        width: 20
        hidden: true
  refetchIntervalMinutes: 30
keybindings: {}
repoPaths: {}
theme:
  ui:
    sectionsShowCount: true
  table:
    showSeparators: true
    compact: false
  colors:
    text:
      primary: "#ffffff"
      secondary: "#c6c6c6"
      inverted: "#303030"
      faint: "#8a8a8a"
      warning: "#800000"
      success: "#008000"
      actor: "#c6c6c6"
    background:
      selected: "#808080"
    border:
      primary: "#808080"
      secondary: "#c0c0c0"
      faint: "#000000"
    inline:
      icons:
        newcontributor: "077"
        contributor: "075"
        collaborator: "178"
        member: "178"
        owner: "178"
        unknownrole: "178"
  icons:
    inline:
      newcontributor: "󰎔"
      contributor: ""
      collaborator: ""
      member: ""
      owner: ""
      unknownrole: "󰭙"

pager:
  diff: ""
confirmQuit: false
showAuthorIcons: true
smartFilteringAtLaunch: true
includeReadNotifications: true
