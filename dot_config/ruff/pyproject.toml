[tool.ruff]
line-length = 100
target-version = "py312"
extend-exclude = [
    ".venv",
    "venv",
    "build",
    "dist",
    "__pycache__",
]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "N",   # pep8-naming
    "B",   # flake8-bugbear
    "UP",  # pyupgrade
    "SIM", # flake8-simplify
    "RUF", # ruff-specific rules
]
ignore = [
    "E501",   # line length — handled by formatter
    "B008",   # function call in default argument (common in FastAPI/Click/typer)
]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["S101", "N802"]  # asserts and pytest-style names are fine in tests
"__init__.py" = ["F401"]        # allow re-exports without explicit re-import

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
line-ending = "lf"
